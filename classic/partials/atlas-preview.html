<!-- Atlas Preview — Fixed-position mini knowledge graph map -->
<div class="atlas-preview" role="img" aria-label="Knowledge graph mini-map showing node connections">
  <!-- SVG knowledge graph visualization -->
  <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg" class="atlas-svg">
    <defs>
      <!-- Glow filter for nodes -->
      <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Background gradient -->
      <radialGradient id="atlas-bg" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="rgba(110,142,255,0.05)"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="200" height="150" fill="var(--bg-elevated)" rx="12"/>
    <rect width="200" height="150" fill="url(#atlas-bg)" rx="12"/>

    <!-- Edges (connections between nodes) -->
    <g class="atlas-edges" opacity="0.3" stroke-width="0.5">
      <!-- Product connections -->
      <line x1="100" y1="30" x2="60" y2="60" stroke="#6e8eff"/>
      <line x1="100" y1="30" x2="140" y2="55" stroke="#6e8eff"/>
      <line x1="100" y1="30" x2="80" y2="75" stroke="#6e8eff"/>
      <line x1="100" y1="30" x2="120" y2="80" stroke="#6e8eff"/>

      <!-- Research cluster -->
      <line x1="40" y1="90" x2="60" y2="60" stroke="#4ade80"/>
      <line x1="40" y1="90" x2="30" y2="110" stroke="#4ade80"/>
      <line x1="60" y1="60" x2="80" y2="75" stroke="#4ade80"/>
      <line x1="80" y1="75" x2="60" y2="105" stroke="#4ade80"/>
      <line x1="60" y1="105" x2="40" y2="90" stroke="#4ade80"/>

      <!-- Demo connections -->
      <line x1="140" y1="55" x2="160" y2="80" stroke="#ff8a5c"/>
      <line x1="160" y1="80" x2="170" y2="110" stroke="#ff8a5c"/>
      <line x1="140" y1="55" x2="150" y2="100" stroke="#ff8a5c"/>
      <line x1="120" y1="80" x2="150" y2="100" stroke="#ff8a5c"/>

      <!-- Cross-domain links -->
      <line x1="30" y1="110" x2="60" y2="105" stroke="rgba(255,255,255,0.1)"/>
      <line x1="80" y1="75" x2="120" y2="80" stroke="rgba(255,255,255,0.15)"/>
      <line x1="60" y1="105" x2="100" y2="130" stroke="rgba(255,255,255,0.1)"/>
      <line x1="150" y1="100" x2="100" y2="130" stroke="rgba(255,255,255,0.1)"/>
    </g>

    <!-- Nodes -->
    <g class="atlas-nodes" filter="url(#node-glow)">
      <!-- Products (blue, largest) -->
      <circle cx="100" cy="30" r="5" fill="#6e8eff" class="atlas-node atlas-node-product">
        <title>Products Hub</title>
      </circle>
      <circle cx="60" cy="60" r="4" fill="#6e8eff" class="atlas-node atlas-node-product">
        <title>Glyph Studio</title>
      </circle>
      <circle cx="140" cy="55" r="4" fill="#6e8eff" class="atlas-node atlas-node-product">
        <title>Coherence Lang</title>
      </circle>

      <!-- Research (green, medium) -->
      <circle cx="40" cy="90" r="3.5" fill="#4ade80" class="atlas-node atlas-node-research">
        <title>Unified Field Theory</title>
      </circle>
      <circle cx="80" cy="75" r="3" fill="#4ade80" class="atlas-node atlas-node-research">
        <title>Quantum Coherence</title>
      </circle>
      <circle cx="30" cy="110" r="2.5" fill="#4ade80" class="atlas-node atlas-node-research">
        <title>Dark Matter</title>
      </circle>
      <circle cx="60" cy="105" r="2.5" fill="#4ade80" class="atlas-node atlas-node-research">
        <title>Biology</title>
      </circle>

      <!-- Demos (orange, small) -->
      <circle cx="160" cy="80" r="2.5" fill="#ff8a5c" class="atlas-node atlas-node-demo">
        <title>Rotation Curve Demo</title>
      </circle>
      <circle cx="170" cy="110" r="2" fill="#ff8a5c" class="atlas-node atlas-node-demo">
        <title>Field Visualizer</title>
      </circle>
      <circle cx="150" cy="100" r="2" fill="#ff8a5c" class="atlas-node atlas-node-demo">
        <title>Compiler Playground</title>
      </circle>
      <circle cx="120" cy="80" r="2.5" fill="#ff8a5c" class="atlas-node atlas-node-demo">
        <title>PDE Solver</title>
      </circle>

      <!-- OneUnity (warm gold, medium) -->
      <circle cx="100" cy="130" r="3" fill="#f5d08a" class="atlas-node atlas-node-oneunity">
        <title>OneUnity</title>
      </circle>

      <!-- Current page indicator (animated) -->
      <circle cx="100" cy="30" r="8" fill="none" stroke="#6e8eff" stroke-width="1"
              class="atlas-current-indicator" opacity="0.6">
        <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Legend -->
    <g class="atlas-legend" font-size="7" fill="var(--text-dim)">
      <circle cx="10" cy="140" r="2.5" fill="#6e8eff"/>
      <text x="16" y="142">Products</text>
      <circle cx="55" cy="140" r="2.5" fill="#4ade80"/>
      <text x="61" y="142">Research</text>
      <circle cx="100" cy="140" r="2.5" fill="#ff8a5c"/>
      <text x="106" y="142">Demos</text>
      <circle cx="140" cy="140" r="2.5" fill="#f5d08a"/>
      <text x="146" y="142">OneUnity</text>
    </g>
  </svg>

  <!-- Expand hint -->
  <div class="atlas-expand-hint" aria-hidden="true">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
      <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8"/>
    </svg>
  </div>
</div>

<style>
  .atlas-preview {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    z-index: 50;
    opacity: 0.5;
    transition: all 0.3s ease;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  .atlas-preview:hover {
    opacity: 1;
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
  }

  .atlas-svg {
    width: 100%;
    height: 100%;
  }

  .atlas-node {
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease;
    transform-origin: center;
  }

  .atlas-node:hover {
    transform: scale(1.5);
    opacity: 1;
  }

  .atlas-expand-hint {
    position: absolute;
    top: 6px;
    right: 6px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .atlas-preview:hover .atlas-expand-hint {
    opacity: 0.6;
  }

  /* Hide on mobile (too small to be useful) */
  @media (max-width: 768px) {
    .atlas-preview { display: none; }
  }

  /* Print: hide */
  @media print {
    .atlas-preview { display: none; }
  }
</style>
