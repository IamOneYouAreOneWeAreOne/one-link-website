<!-- Lab Status Strip — Real-time lab status bar with system metrics -->
<div class="lab-status" role="status" aria-label="Lab system status">
  <!-- Operational indicator -->
  <div class="lab-status-item">
    <span class="lab-status-dot" aria-label="System operational"></span>
    <span class="lab-status-text">Operational</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Compiler version -->
  <div class="lab-status-item">
    <span class="lab-status-key">Compiler</span>
    <span class="lab-status-val">clc v1.0 (8 backends)</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Build status -->
  <div class="lab-status-item">
    <span class="lab-status-key">Build</span>
    <span class="lab-status-val lab-status-pass">passing</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Knowledge graph stats -->
  <div class="lab-status-item">
    <span class="lab-status-key">Nodes</span>
    <span class="lab-status-val">108</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <div class="lab-status-item">
    <span class="lab-status-key">Edges</span>
    <span class="lab-status-val">68</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- LOC stats -->
  <div class="lab-status-item">
    <span class="lab-status-key">LOC</span>
    <span class="lab-status-val">1.54M</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Dependencies -->
  <div class="lab-status-item">
    <span class="lab-status-key">npm deps</span>
    <span class="lab-status-val lab-status-zero">0</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Galaxies validated -->
  <div class="lab-status-item">
    <span class="lab-status-key">Galaxies</span>
    <span class="lab-status-val">171/175 SPARC</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Guardian gates -->
  <div class="lab-status-item">
    <span class="lab-status-key">Guardian</span>
    <span class="lab-status-val lab-status-pass">13/13 gates</span>
  </div>

  <span class="lab-status-sep" aria-hidden="true">|</span>

  <!-- Last deploy -->
  <div class="lab-status-item">
    <span class="lab-status-key">Deploy</span>
    <time class="lab-status-val" datetime="2026-03-07T00:00:00Z">2026-03-07</time>
  </div>
</div>

<style>

    color: var(--text-muted);

    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
    -ms-overflow-style: none;
