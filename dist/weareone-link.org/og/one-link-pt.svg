<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="22%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#6ef0f4" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#04060b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="82%" cy="85%" r="60%">
      <stop offset="0%" stop-color="#9b8cff" stop-opacity="0.16"/>
      <stop offset="65%" stop-color="#04060b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logo" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#c7faff"/>
      <stop offset="55%" stop-color="#6ef0f4"/>
      <stop offset="100%" stop-color="#163b3e"/>
    </radialGradient>
    <linearGradient id="grad-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="60%" stop-color="#6ef0f4"/>
      <stop offset="100%" stop-color="#9b8cff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#04060b"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- subtle precision grid -->
  <g stroke="rgba(150,175,200,0.04)" stroke-width="1">
    <g>
      <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
      <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
      <line x1="0" y1="560" x2="1200" y2="560"/>
    </g>
    <g>
      <line x1="80" y1="0" x2="80" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
      <line x1="400" y1="0" x2="400" y2="630"/><line x1="560" y1="0" x2="560" y2="630"/>
      <line x1="720" y1="0" x2="720" y2="630"/><line x1="880" y1="0" x2="880" y2="630"/>
      <line x1="1040" y1="0" x2="1040" y2="630"/>
    </g>
  </g>

  <!-- logo -->
  <g transform="translate(96, 92)">
    <circle cx="40" cy="40" r="36" fill="url(#logo)"/>
    <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(110,240,244,0.4)" stroke-width="1.2"/>
    <text x="100" y="56" fill="#f0f4f8" font-family="-apple-system, Inter, Segoe UI, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.01em">One Link</text>
  </g>

  <!-- we are one tag -->
  <text x="96" y="260" fill="#6ef0f4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" letter-spacing="0.22em">SOMOS UM</text>

  <!-- headline -->
  <text x="96" y="356" fill="#f0f4f8" font-family="-apple-system, Inter, Segoe UI, sans-serif" font-size="84" font-weight="700" letter-spacing="-0.03em">Envia qualquer coisa.</text>
  <text x="96" y="446" fill="#f0f4f8" font-family="-apple-system, Inter, Segoe UI, sans-serif" font-size="84" font-weight="700" letter-spacing="-0.03em">A qualquer pessoa.</text>
  <text x="96" y="536" font-family="-apple-system, Inter, Segoe UI, sans-serif" font-size="84" font-weight="700" letter-spacing="-0.03em" fill="url(#grad-text)">Só tu podes lê-lo.</text>

  <!-- domain -->
  <text x="96" y="594" fill="#a8b2c1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" font-weight="500" letter-spacing="0.04em">weareone-link.org</text>
</svg>
